@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1320;--panel:#151d2e;--panel2:#1b2438;--line:#27324a;
--ink:#e9eef7;--mute:#8593ab;--faint:#5d6b85;--teal:#2dd4bf;--amber:#f5b53f;--rose:#f2706e;--blue:#5b8def;--violet:#a78bfa}
body{background:var(--bg);color:var(--ink);font-family:'Space Grotesk',system-ui,sans-serif;line-height:1.5;
max-width:1440px;margin:0 auto;padding:20px 22px 50px}
/* ── topnav ── */
.topnav{position:sticky;top:0;z-index:40;display:flex;gap:6px;align-items:center;flex-wrap:wrap;
  background:rgba(13,19,32,.92);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1px solid var(--line);border-radius:12px;padding:8px 10px;margin-bottom:18px}
.topnav a{font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:600;text-decoration:none;
  color:var(--mute);padding:6px 12px;border-radius:8px;transition:.12s;white-space:nowrap}
.topnav a:hover{color:var(--ink);background:var(--panel2)}
.topnav a.on{background:var(--teal);color:#0d1320}
.topnav .brand{color:var(--ink);font-weight:700}
.topnav .brand .dot{color:var(--teal)}
.topnav .sp{flex:1}
/* ── controls ── */
.ctrlrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.tabs{display:inline-flex;background:var(--panel2);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.tab{padding:8px 22px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;
  color:var(--mute);font-family:inherit;transition:.12s;white-space:nowrap}
.tab.on{background:var(--teal);color:#0d1320}
.dbadge{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--faint);margin-left:auto}
.rbtn{background:var(--panel2);color:var(--mute);border:1px solid var(--line);border-radius:9px;
  padding:7px 14px;font-weight:600;cursor:pointer;font-size:12px;font-family:inherit}
.rbtn:hover{color:var(--ink)}
.rbtn:disabled{opacity:.5;cursor:default}
.live{display:inline-flex;align-items:center;gap:7px;color:#7ee7da;font-size:11.5px;
  background:rgba(45,212,191,.1);border:1px solid rgba(45,212,191,.3);border-radius:8px;padding:4px 10px}
.live .dot2{width:7px;height:7px;border-radius:50%;background:#2dd4bf;animation:pls 1.6s infinite}
.live.err{color:#f2a3a2;background:rgba(242,112,110,.1);border-color:rgba(242,112,110,.3)}
.live.err .dot2{background:#f2706e;animation:none}
@keyframes pls{0%{box-shadow:0 0 0 0 rgba(45,212,191,.5)}70%{box-shadow:0 0 0 6px rgba(45,212,191,0)}100%{box-shadow:0 0 0 0 rgba(45,212,191,0)}}
/* ── legend ── */
.legend{display:flex;align-items:center;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:3px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mute)}
.ls{width:12px;height:12px;border-radius:2px;flex-shrink:0}
.lsep{width:6px}
/* ── treemap wrapper ── */
.mapwrap{width:100%;border-radius:12px;border:1px solid var(--line);background:#0a0f1a;overflow:hidden}
.mapinner{position:relative}
/* ── sector node ── */
.sec{position:absolute;pointer-events:none}
.sec-lbl{position:absolute;top:4px;left:7px;font-size:11.5px;font-weight:700;
  color:rgba(255,255,255,.65);letter-spacing:.15px;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;pointer-events:none;text-shadow:0 1px 4px rgba(0,0,0,.8)}
/* ── stock tile ── */
.stk{position:absolute;box-sizing:border-box;display:flex;flex-direction:column;
  align-items:center;justify-content:center;overflow:hidden;cursor:default;
  border:1px solid rgba(0,0,0,.3);border-radius:2px;transition:filter .08s,z-index 0s}
.stk:hover{filter:brightness(1.18);z-index:20}
.stk .tk{font-family:'IBM Plex Mono',monospace;font-weight:600;color:#fff;
  text-shadow:0 1px 4px rgba(0,0,0,.7);white-space:nowrap;overflow:hidden;

.stk .ch{font-family:'IBM Plex Mono',monospace;color:rgba(255,255,255,.85);

/* ── tooltip ── */

/* ── misc ── */

.disc{margin-top:18px;font-size:10.5px;color:var(--faint);line-height:1.6}
@media(max-width:640px){.dbadge{display:none}}

// ── 색상 ──
function getColor(pct) {
  if (pct == null) return '#2d3a4a';
  if (pct >= 4)   return '#0a7a25';
  if (pct >= 3)   return '#129635';
  if (pct >= 2)   return '#1ab345';
  if (pct >= 1)   return '#20cc55';
  if (pct >= 0)   return '#18903e';
  if (pct >= -1)  return '#8c2020';
  if (pct >= -2)  return '#aa2b2b';
  if (pct >= -3)  return '#c83535';
  return '#e04040';
}

// ── API ──
async function fetchIndices(symbols) {
  const url = `${PROXY}/api/indices?symbols=${symbols.map(encodeURIComponent).join(',')}&range=1mo`;
  const r = await fetch(url, {cache:'no-store'});
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const j = await r.json();
  if (!j.ok) throw new Error(j.error || 'indices error');
  return j.data;
}

function calc1D(arr) {
  if (!arr || arr.length < 2) return null;
  const last = arr[arr.length - 1]?.c;
  const prev = arr[arr.length - 2]?.c;
  if (!last || !prev) return null;
  return (last / prev - 1) * 100;
}

function lastPrice(arr) {
  if (!arr || !arr.length) return null;
  return arr[arr.length - 1]?.c || null;
}

function lastDate(arr) {
  if (!arr || !arr.length) return null;
  return arr[arr.length - 1]?.date || null;
}

// ── 로드 ──
async function loadSectors(sectors) {
  const all = sectors.flatMap(s => s.stocks.map(st => st.t));
  // 20개씩 배치 (프록시 타임아웃 방지)
  const BATCH = 20;
  const results = {};
  for (let i = 0; i < all.length; i += BATCH) {
    const batch = all.slice(i, i + BATCH);
    try {
      const data = await fetchIndices(batch);
      Object.assign(results, data);
    } catch(e) { /* silent — tile will show N/A */ }
  }
  return results;
}

// ── 상태 ──
let curMarket = 'nasdaq';
let cache = { nasdaq: null, kospi: null };
let loading = false;

function setLive(ok, txt) {
  const b = $('liveBadge');
  b.className = ok ? 'live' : 'live err';
  $('liveText').textContent = txt;
}

// ── 렌더 ──
function renderMap(sectors, priceData) {
  const wrap = $('mapInner');
  const W = wrap.parentElement.clientWidth || 900;
  const H = Math.max(480, Math.round(W * 0.58));
  wrap.style.width = W + 'px';
  wrap.style.height = H + 'px';

  // D3 hierarchy 구성
  const root = d3.hierarchy({
    name: 'root',
    children: sectors.map(s => ({
      name: s.s,
      children: s.stocks.map(st => {
        const arr = priceData[st.t];
        return {
          ticker: st.t.replace('.KS',''),
          name: st.n,
          mc: st.mc,
          chg: calc1D(arr),
          price: lastPrice(arr),
          date: lastDate(arr),
          isCurrency: st.t.endsWith('.KS'),
        };
      })
    }))
  })
  .sum(d => d.mc || 0)
  .sort((a, b) => b.value - a.value);

  d3.treemap()
    .size([W, H])
    .paddingOuter(2)
    .paddingInner(1)
    .paddingTop(19)
    .round(true)(root);

  // DOM 구성
  const frag = document.createDocumentFragment();

  // 섹터 배경 + 레이블
  (root.children || []).forEach(sec => {
    const sw = sec.x1 - sec.x0, sh = sec.y1 - sec.y0;
    const el = document.createElement('div');
    el.className = 'sec';
    el.style.cssText = `left:${sec.x0}px;top:${sec.y0}px;width:${sw}px;height:${sh}px;border:1px solid rgba(255,255,255,.07)`;
    const lbl = document.createElement('span');
    lbl.className = 'sec-lbl';
    lbl.style.maxWidth = (sw - 10) + 'px';
    lbl.textContent = sec.data.name;
    el.appendChild(lbl);
    frag.appendChild(el);
  });

  // 종목 타일
  const tip = $('tip');
  root.leaves().forEach(leaf => {
    const d = leaf.data;
    const tw = leaf.x1 - leaf.x0, th = leaf.y1 - leaf.y0;
    if (tw < 4 || th < 4) return;

    const el = document.createElement('div');
    el.className = 'stk';
    el.style.cssText = `left:${leaf.x0}px;top:${leaf.y0}px;width:${tw}px;height:${th}px;background:${getColor(d.chg)}`;

    const fsz = Math.min(13, Math.max(8, tw / 5));
    const csz = Math.max(7, fsz - 2);

    if (tw > 24 && th > 18) {
      const tk = document.createElement('div');
      tk.className = 'tk';
      tk.style.fontSize = fsz + 'px';
      tk.textContent = d.ticker;
      el.appendChild(tk);

      if (th > 34 && d.chg != null) {
        const ch = document.createElement('div');
        ch.className = 'ch';
        ch.style.fontSize = csz + 'px';
        ch.textContent = (d.chg >= 0 ? '+' : '') + d.chg.toFixed(1) + '%';
        el.appendChild(ch);
      }
    }

    // 툴팁
    el.addEventListener('mouseenter', () => {
      $('tipName').textContent = d.name + ' (' + d.ticker + ')';
      const chgTxt = d.chg != null ? (d.chg >= 0 ? '+' : '') + d.chg.toFixed(2) + '%' : '데이터 없음';
      $('tipChg').textContent = chgTxt;
      $('tipChg').style.color = d.chg == null ? '#8593ab' : d.chg >= 0 ? '#2dd4bf' : '#f2706e';
      const priceStr = d.price != null
        ? (d.isCurrency ? '₩' + Math.round(d.price).toLocaleString() : '$' + d.price.toFixed(2))
        : '';
      $('tipMeta').textContent = [
        priceStr,
        d.date ? d.date + ' 기준' : '',
      ].filter(Boolean).join(' · ');
      tip.style.display = 'block';
    });
    el.addEventListener('mousemove', e => {
      tip.style.left = Math.min(e.clientX + 14, window.innerWidth - 175) + 'px';
      tip.style.top  = Math.min(e.clientY + 14, window.innerHeight - 90) + 'px';
    });
    el.addEventListener('mouseleave', () => { tip.style.display = 'none'; });

    frag.appendChild(el);
  });

  wrap.innerHTML = '';
  wrap.appendChild(frag);
}

// ── 메인 로드 ──
async function load(market) {
  if (loading) return;
  loading = true;
  $('refreshBtn').disabled = true;
  setLive(true, '불러오는 중…');
  $('mapInner').innerHTML = '<div class="statemsg">데이터를 불러오는 중…</div>';

  const sectors = market === 'nasdaq' ? NASDAQ_SECTORS : KOSPI_SECTORS;
  try {
    const priceData = await loadSectors(sectors);
    cache[market] = priceData;
    renderMap(sectors, priceData);

    // 날짜 배지: 첫 종목의 마지막 날짜
    const firstTicker = sectors[0].stocks[0].t;
    const arr = priceData[firstTicker];
    const d = arr ? lastDate(arr) : null;
    $('dateBadge').textContent = d ? '기준: ' + d : '기준: —';

    setLive(true, 'LIVE');
  } catch(e) {
    $('mapInner').innerHTML = `<div class="statemsg">오류: ${e.message || e}</div>`;
    setLive(false, '오류');
  }
  $('refreshBtn').disabled = false;
  loading = false;
}

// ── 탭 전환 ──
function switchMarket(market) {
  if (market === curMarket && cache[market]) return;
  curMarket = market;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.m === market));
  load(market);
}

function onRefresh() {
  cache[curMarket] = null;
  load(curMarket);
}

// ── 리사이즈 ──
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (cache[curMarket]) {
      const sectors = curMarket === 'nasdaq' ? NASDAQ_SECTORS : KOSPI_SECTORS;
      renderMap(sectors, cache[curMarket]);
    }
  }, 200);
});

// ── nav 활성화 ──
(function(){
  const f = (location.pathname.split('/').pop() || 'index.html').toLowerCase();
  document.querySelectorAll('.topnav a').forEach(a => {
    const h = (a.getAttribute('href') || '').toLowerCase();
    if (h === f) a.classList.add('on');
  });
})();

load('nasdaq');
</script>
